name: argus

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  # For --pr-comments: post new findings as review comments on the PR.
  pull-requests: write

jobs:
  argus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      # Versions are PINNED: "install latest" made the gate nondeterministic
      # (new semgrep rules change the finding set between runs of the same
      # commit) and the un-pinned gitleaks download already caused a flaky
      # red check. Bump the pins deliberately, one PR at a time.
      - name: Install scanners
        env:
          SEMGREP_VERSION: 1.169.0
          TRIVY_VERSION: 0.72.0
          GITLEAKS_VERSION: 8.30.1
        run: |
          pipx install "semgrep==${SEMGREP_VERSION}"
          curl -sSfL --retry 3 https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
          curl -sSfL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          semgrep --version && trivy --version && gitleaks version

      - name: Build argus CLI
        run: go build -o argus ./cmd/argus

      - name: Run unit tests
        run: go test -short ./...

      - name: Demo scan of vulnerable fixture (SARIF)
        # Uses the demo config: no ignore_paths, so the planted findings show.
        run: ./argus scan testdata/fixture -c .github/argus-demo.yml -o results.sarif
        continue-on-error: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        # Code scanning is not enabled on this private repo (needs Advanced
        # Security), so the upload fails with "Resource not accessible by
        # integration". Keep attempting it — it starts working the moment the
        # repo goes public — but never fail the build on it.
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: argus-fixture-demo

      - name: Gate on high severity findings
        # Repo's argus.yml ignores testdata/**, so this gates the real code.
        # --pr-comments dogfoods the PR review loop: on pull_request runs it
        # posts any gated findings on the PR (advisory; the gate still owns
        # the exit code), and on push runs it detects no PR and does nothing.
        run: ./argus scan . --fail-severity high --pr-comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
