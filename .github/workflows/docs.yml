name: docs

# Build the documentation site with Material for MkDocs and publish it to
# GitHub Pages. Runs on changes to the docs, and can be triggered by hand.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege: this workflow only needs to read the repo and publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install imaging libraries (for social cards)
        # The imaging libs all live in Ubuntu's own repos. Drop the third-party
        # apt sources preinstalled on the runner (packages.microsoft.com and
        # friends) before updating: when one of them serves a broken or expired
        # signature, `apt-get update` fails the whole step and blocks the docs
        # deploy for reasons that have nothing to do with our docs.
        run: |
          sudo rm -f /etc/apt/sources.list.d/*microsoft*.list /etc/apt/sources.list.d/*azure*.list || true
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install Material for MkDocs
        run: pip install "mkdocs-material[imaging]>=9.5"

      - name: Build site
        # CI=true (set by Actions) turns on the social-cards plugin.
        run: mkdocs build --strict --site-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
