# GoReleaser: reproducible, signed, provenanced releases for Argus. A security
# tool that ships unsigned undercuts its own story, so a release carries:
#   - multi-platform binaries built with pinned, stamped version metadata
#   - a SHA-256 checksums file
#   - a CycloneDX SBOM per archive (syft)
#   - a keyless cosign signature over the checksums (Sigstore, OIDC identity)
# and the release workflow adds an SLSA build-provenance attestation on top.
#
# Verify a downloaded release with docs/verifying-releases.md.
version: 2

project_name: argus

before:
  hooks:
    - go mod tidy

builds:
  - id: argus
    main: ./cmd/argus
    binary: argus
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    # -s -w strips the symbol/debug tables (smaller binary); the -X flags stamp
    # the build metadata the CLI reports and the provenance ties to.
    ldflags:
      - -s -w
      - -X github.com/zer0d4y5/argus/internal/cli.version={{ .Version }}
      - -X github.com/zer0d4y5/argus/internal/cli.commit={{ .FullCommit }}
      - -X github.com/zer0d4y5/argus/internal/cli.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}" # reproducible: binary mtime = commit time

archives:
  - id: argus
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# One CycloneDX SBOM per archive, generated by syft, uploaded alongside the
# release: the argus binary ships with its own bill of materials.
sboms:
  - id: archive-sbom
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.cyclonedx.json"
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

# Keyless cosign signature over the checksums file. No private key: the
# signature is bound to the workflow's OIDC identity and logged in the public
# Rekor transparency log. COSIGN_YES avoids the interactive prompt in CI.
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"

release:
  draft: false
  prerelease: auto # a tag like v1.2.3-rc1 becomes a GitHub pre-release
  footer: |
    ---
    Verify this release (signature, provenance, SBOM):
    https://zer0d4y5.github.io/argus/verifying-releases/

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
